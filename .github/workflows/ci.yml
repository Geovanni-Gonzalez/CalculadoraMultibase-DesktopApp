name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    name: Install and syntax-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        working-directory: src
        run: npm ci

      - name: Check JavaScript syntax
        working-directory: src
        run: |
          for file in main.js renderer.js math_core.js calc_worker.js; do
            node --check "$file"
          done
